<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGCIDCIENCIA - Gestión de Proyectos</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
    .diplomatic-shadow { box-shadow: 0 8px 24px rgba(22,40,57,0.06); }
    .bg-surface { background-color: #f8f9fa; }
    .bg-surface-container-low { background-color: #edeeef; }
    .bg-surface-container-high { background-color: #e7e8e9; }
    .bg-surface-container-lowest { background-color: #ffffff; }
    .text-primary { color: #162839; }
    .text-secondary { color: #4646d8; }
    .text-outline { color: #74777d; }
    .text-on-surface-variant { color: #43474c; }
    .border-secondary\/10 { border-color: rgba(70,70,216,0.1); }
    .bg-secondary-fixed { background-color: #e1e0ff; }
    .bg-tertiary-fixed { background-color: #6dfad2; }
    .rotate-180 { transform: rotate(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <!-- HEADER -->
  <header class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
        <i class="fas fa-globe-americas text-xl"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">DGCIDCIENCIA</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">DG de Proyectos de Cooperación Internacional</p>
      </div>
    </div>
    <button id="btnMenu" class="p-2 hover:bg-slate-100 rounded-full transition-all text-indigo-600 focus:ring-2 focus:ring-indigo-500">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </header>






    <!-- MENÚ DESPLEGABLE -->
  <div id="menuPanel" class="hidden absolute top-[70px] right-4 bg-white rounded-xl shadow-lg border border-slate-100 z-50 w-56 overflow-hidden">
    <div class="py-2">
      <button id="menuProyectosEntregados" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 transition-colors flex items-center gap-3">
        <span class="material-symbols-outlined text-indigo-500 text-base">check_circle</span>
        Proyectos entregados
      </button>
      <button id="menuFichasTecnicas" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 transition-colors flex items-center gap-3">
        <span class="material-symbols-outlined text-indigo-500 text-base">description</span>
        Fichas Técnicas
      </button>
    </div>
  </div>




  

  <!-- FILTROS (REDISEÑADO) -->
  <div id="filterSection" class="bg-surface px-4 pt-4 pb-2 sticky top-[65px] z-30">
    <div class="relative group mb-4">
      <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
        <span class="material-symbols-outlined">search</span>
      </div>
      <input id="searchInput" type="search" placeholder="Buscar por nombre del proyecto..." 
        class="w-full h-14 pl-14 pr-6 bg-surface-container-lowest border-none rounded-2xl diplomatic-shadow text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary transition-all">
    </div>
    
    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
      <select id="filterResponsible" class="bg-surface-container-lowest border-none rounded-xl px-4 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-secondary text-on-surface min-w-[100px] whitespace-nowrap">
        <option value="">Todos los sectores</option>
      </select>
      <select id="filterStatus" class="bg-surface-container-lowest border-none rounded-xl px-4 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-secondary text-on-surface min-w-[100px] whitespace-nowrap">
        <option value="">Estatus</option>
        <option value="Planeación">Planeación</option>
        <option value="Ejecución">Ejecución</option>
        <option value="Finalizado">Finalizado</option>
      </select>
      <select id="filterState" class="bg-surface-container-lowest border-none rounded-xl px-4 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-secondary text-on-surface min-w-[100px] whitespace-nowrap">
        <option value="">Estados</option>
      </select>
    </div>

    <!-- TAB SWITCHER: PROYECTOS / ACCIONES (CENTRADO COMO GESTIÓN) -->
    <div class="mt-4 flex justify-center">
      <div class="flex p-1.5 bg-surface-container-high rounded-2xl w-auto">
        <button id="subtabProyectos" class="px-6 md:px-8 py-2.5 rounded-xl text-sm font-bold tracking-wide transition-all bg-surface-container-lowest text-secondary shadow-sm">
          Proyectos
        </button>
        <button id="subtabAcciones" class="px-6 md:px-8 py-2.5 rounded-xl text-sm font-bold tracking-wide transition-all text-on-surface-variant hover:bg-surface-container">
          Acciones
        </button>
      </div>
    </div>
  </div>


  <main class="p-4 max-w-2xl mx-auto">
    <!-- LISTA DE PROYECTOS -->
    <section id="projectList" class="space-y-4"></section>

    <!-- SECCIÓN ACCIONES (PLACEHOLDER) -->
    <section id="accionesSection" class="hidden">
      <div class="bg-surface-container-low rounded-2xl p-8 text-center">
        <span class="material-symbols-outlined text-6xl text-outline mb-3">construction</span>
        <h3 class="font-headline font-bold text-xl text-primary mb-2">Próximamente</h3>
        <p class="text-on-surface-variant text-sm">La visualización de Acciones está en desarrollo.<br>¡Vuelve pronto!</p>
      </div>
    </section>

    <!-- NORMATECA -->
    <section id="normatecaSection" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-primary">Normateca Digital</h2>
        <button id="btnnormatecaExcel" class="text-secondary text-sm font-semibold flex items-center gap-1">
          <i class="fas fa-file-excel"></i> Exportar
        </button>
      </div>
      <div id="normatecaList" class="space-y-4"></div>
    </section>

    <!-- GESTIÓN -->
    <section id="gestionSection" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-primary">Gestión</h2>
        <p class="text-on-surface-variant text-sm font-medium">Panel de control por categoría.</p>
      </div>
      <div id="gestionContent" class="space-y-6">
        <div id="gestionTabs" class="flex gap-2 bg-surface-container-high rounded-xl p-1">
          <button id="tabCapacitaciones" class="flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded-lg bg-surface-container-lowest text-secondary shadow-sm">
            Capacitaciones
          </button>
          <button id="tabInvestigacion" class="flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded-lg text-on-surface-variant">
            Permisos de Investigación
          </button>
        </div>
        <div id="gestionCapacitaciones" class="space-y-4">
          <div class="text-xs tracking-widest text-outline uppercase font-bold">CAPACITACIONES</div>
          <div id="capacitacionesList"></div>
        </div>
        <div id="gestionInvestigacion" class="hidden">
          <div class="text-xs tracking-widest text-outline uppercase font-bold">PERMISOS DE INVESTIGACIÓN</div>
          <div id="investigacionList"></div>
        </div>
      </div>
    </section>

    <!-- REPORTES -->
    <section id="reportsSection" class="hidden space-y-4">
      <h2 class="text-xl font-bold text-primary mb-4">Reportes y Datos</h2>
      <div class="grid grid-cols-1 gap-4">
        <button id="btnExportPDF" class="flex items-center gap-4 bg-surface-container-lowest p-4 rounded-xl border border-surface-container shadow-sm hover:border-secondary/20 transition-colors">
          <div class="w-12 h-12 bg-red-100 text-red-600 rounded-lg flex items-center justify-center text-xl"><i class="fas fa-file-pdf"></i></div>
          <div class="text-left">
            <div class="font-bold text-primary">Exportar PDF</div>
            <div class="text-xs text-outline">Genera un documento visual de los proyectos</div>
          </div>
        </button>
        <button id="btnExportXLS" class="flex items-center gap-4 bg-surface-container-lowest p-4 rounded-xl border border-surface-container shadow-sm hover:border-secondary/20 transition-colors">
          <div class="w-12 h-12 bg-green-100 text-green-600 rounded-lg flex items-center justify-center text-xl"><i class="fas fa-file-excel"></i></div>
          <div class="text-left">
            <div class="font-bold text-primary">Exportar Excel</div>
            <div class="text-xs text-outline">Hoja de cálculo para análisis de datos</div>
          </div>
        </button>
        <button id="btnImportJSON" class="flex items-center gap-4 bg-surface-container-lowest p-4 rounded-xl border border-surface-container shadow-sm hover:border-secondary/20 transition-colors">
          <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-xl"><i class="fas fa-file-import"></i></div>
          <div class="text-left">
            <div class="font-bold text-primary">Importar JSON</div>
            <div class="text-xs text-outline">Cargar respaldo de base de datos</div>
          </div>
        </button>
      </div>
    </section>
  </main>

  <div id="printArea" class="hidden"></div>

  <!-- NAVEGACIÓN INFERIOR -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-3 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="tabProyectos" class="flex flex-col items-center gap-1 active-tab transition-colors px-4">
      <i class="fas fa-folder-open text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Proyectos</span>
    </button>
    <button id="tabnormateca" class="flex flex-col items-center gap-1 text-slate-400 transition-colors px-4">
      <i class="fas fa-book text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Normateca</span>
    </button>
    <button id="tabgestion" class="flex flex-col items-center gap-1 text-slate-400 transition-colors px-4">
      <i class="fas fa-layer-group text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Gestión</span>
    </button>
    <button id="tabReportes" class="flex flex-col items-center gap-1 text-slate-400 transition-colors px-4">
      <i class="fas fa-chart-bar text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Reportes</span>
    </button>
  </nav>

  <!-- MODAL DE PROYECTO -->
  <div id="modal" class="fixed inset-0 hidden items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm z-[60]">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl p-6 w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-xl font-extrabold text-slate-800 italic">NUEVO PROYECTO</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      
      <form id="projectForm" class="space-y-5">
        <input type="hidden" id="projId" />
        <div class="space-y-1">
          <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Nombre del Proyecto</label>
          <input id="projNombredelproyecto" required class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Continente</label>
            <input id="projContinente" required class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">País</label>
            <input id="projPais" required class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Sector</label>
          <input id="projSector" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div class="col-span-1 space-y-1">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Estado</label>
            <select id="projStatus" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs">
              <option>Planeación</option>
              <option>Ejecución</option>
              <option>Finalizado</option>
            </select>
          </div>
          <div class="col-span-1 space-y-1">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Inicio</label>
            <input id="projFechadeinicio" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs">
          </div>
          <div class="col-span-1 space-y-1">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Término</label>
            <input id="projFechadetermino" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Objetivo Estratégico</label>
          <textarea id="projObjetivo" rows="3" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none"></textarea>
        </div>
        <div class="space-y-1">
          <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Notas Adicionales</label>
          <textarea id="projNotas" rows="2" class="w-full bg-slate-50 p-3 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" id="btnCancel" class="flex-1 py-4 text-slate-500 font-bold uppercase tracking-widest text-xs">Cancelar</button>
          <button type="submit" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Guardar Proyecto</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
