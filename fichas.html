<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGCIDCIENCIA - Fichas Técnicas</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
    .diplomatic-shadow { box-shadow: 0 8px 24px rgba(22,40,57,0.06); }
    .bg-surface { background-color: #f8f9fa; }
    .bg-surface-container-low { background-color: #edeeef; }
    .bg-surface-container-high { background-color: #e7e8e9; }
    .bg-surface-container-lowest { background-color: #ffffff; }
    .text-primary { color: #162839; }
    .text-secondary { color: #4646d8; }
    .text-outline { color: #74777d; }
    .text-on-surface-variant { color: #43474c; }
    .border-secondary\/10 { border-color: rgba(70,70,216,0.1); }
    .bg-secondary-fixed { background-color: #e1e0ff; }
    .bg-tertiary-fixed { background-color: #6dfad2; }
    .rotate-180 { transform: rotate(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <!-- HEADER (igual que portal.html) -->
  <header class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
        <i class="fas fa-globe-americas text-xl"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">DGCIDCIENCIA</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">DG de Proyectos de Cooperación Internacional</p>
      </div>
    </div>
    <button id="btnMenu" class="p-2 hover:bg-slate-100 rounded-full transition-all text-indigo-600 focus:ring-2 focus:ring-indigo-500">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </header>

  <!-- MENÚ DESPLEGABLE -->
  <div id="menuPanel" class="hidden fixed top-[60px] right-4 bg-white rounded-xl shadow-xl border border-gray-200 z-[9999] w-56">
    <div class="flex flex-col">
      <button id="menuProyectosEntregados" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-t-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">check_circle</span>
        <span>Proyectos entregados</span>
      </button>
      <button id="menuFichasTecnicas" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-b-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">description</span>
        <span>Fichas Técnicas</span>
      </button>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="pt-6 pb-32 px-4 max-w-7xl mx-auto">
    <div class="mb-6">
      <h2 class="text-3xl font-bold text-primary">Catálogo de Fichas</h2>
      <p class="text-on-surface-variant text-base mt-2">Accede a las especificaciones técnicas detalladas y documentación de los proyectos.</p>
    </div>

    <!-- Grid de tarjetas -->
    <div id="fichasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Las tarjetas se generarán dinámicamente desde JavaScript -->
    </div>
  </main>

  <!-- FOOTER (solo INICIO) -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-center items-center py-3 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="btnInicio" class="flex flex-col items-center gap-1 transition-colors px-6 text-indigo-600 hover:text-indigo-800">
      <i class="fas fa-home text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Inicio</span>
    </button>
  </nav>

  <script>
    // Datos de países para las fichas técnicas (puedes expandirlo con más países)
    const paisesFichas = [
      {

        descripcion: "Ficha Técnica de Capacitación Integral. Protocolos regionales y estándares de excelencia operativa.",
        tags: ["CAPACITACIÓN 2024", "Activo"]
      },
      {
        nombre: "Japón",
        imagen: "https://lh3.googleusercontent.com/aida-public/AB6AXuDEOGw2fN6JD0LhzWeRIq1wMLisbMRxwCNeyZbETLYBFijetD2kXdCoKWYqRLvKDJ9pFzg_eY5Z_RPHx3GxF7JnHz1msZHaQpn4Nx4rWDYcArEDgZXrn1heQx5zMKz-rvMMu3Jc5L1AHEeaRpvOVgy4EuYfD5fBJz8TwRBo4JiDYTABYwKJHCQLfKIkGKZ9a7Fm08OlpaiOuof300TgABzZrtJeDMyHYTPmLB3rT5klLq0jvrQGuI0pusjoxAWpSD6zDXfk_grSdLA",
        descripcion: "Metodologías Kaizen aplicadas al desarrollo corporativo. Optimización de procesos técnicos de alta precisión.",
        tags: ["CAPACITACIÓN 2024"]
      },
      {
        nombre: "China",
        imagen: "https://lh3.googleusercontent.com/aida-public/AB6AXuCS3RW5eJIDL3Sgk_wkjmKhqzZM8lt-4O7MgUKQccZgsKcEVCZR2Jkt02M0jUJ048seuk-IS290sVFsBVvF5zj6zCZjaesSBWo8Ge3Otyoo2Xf9-vk4KtF7jYyjvVli4Q15oihIXvM31SEU93Zc5kLYAASV3W9y1Mwiq3Iv1F2Tqww-Xf7GLdUIyIkMbDuXiOcVHEVnm_tkSKdp2wDpBnr0a6qAGXm1XrImxKD3KdzqLJN55mUcBEOQybTNbjqRpjsFkHt8_c1CGdg",
        descripcion: "Estrategias de escalabilidad masiva y manufactura avanzada. Especialización en infraestructura tecnológica.",
        tags: ["CAPACITACIÓN 2024"]
      },
      {
        nombre: "Corea del Sur",
        imagen: "https://lh3.googleusercontent.com/aida-public/AB6AXuC_poH8z6R2tctzEck94CwCTlkqIMr_XbNfTMZvpD4k4aN7IMB0Vjiiko3IK7mBvbRud_-eQ_XU9sWNeufQXzgHLl4e4aDOCjhj9tlu6PR8zUpUd7l4bmk1-HqiRdJrSSaIfEn0xamjOdjw_0uigSv56ebk6zhATV3763yH8MYXiyRcXOdgXVbVq8rwsta7sBNlt8e2Hr7fx3oZbvIDHYFirQ1pOcpuNoC-0mHRS9HHDerUIN6mdixflfQNNPKfhRQRZQ1yf8X2h08",
        descripcion: "Innovación digital y ecosistemas inteligentes. Guía técnica de desarrollo de software y hardware.",
        tags: ["CAPACITACIÓN 2024"]
      },
      {
        nombre: "Singapur",
        imagen: "https://lh3.googleusercontent.com/aida-public/AB6AXuCrjKV8XxlcNMp5O4Wo7G6sYsrqgg5_Tx0wAaR3Ttmdi-p25-zQV0sGfIqkzK9naMG_kwl5LolLBhmL6wKuzb686NfvPZ_jfTb0Q95cGI7Z83igSf7qLZowMHtim_X3ctwm5oKxGo5Dnh2MC1f1ZhorTy9SLF3xAc_FlES9SlF1vOmVFKp_Ch0_U9fmy2n-uNIZCdeRaGgrnkWut2JpZiDhiqxm1YHFn7hX0yuU8l-JHzsTSQR-uefbkilbfQoLuEuXK-oAM5XRc1g",
        descripcion: "Hub logístico y finanzas globales. Certificación técnica en estándares internacionales de comercio.",
        tags: ["CAPACITACIÓN 2024", "Nuevo"]
      }
    ];

    function renderFichas() {
      const container = document.getElementById("fichasGrid");
      if (!container) return;
      
      container.innerHTML = "";
      
      paisesFichas.forEach(pais => {
        const card = document.createElement("div");
        card.className = "glass-card rounded-xl p-5 shadow-lg border border-indigo-100/50 flex flex-col transition-all hover:translate-y-[-4px] hover:shadow-xl";
        
        card.innerHTML = `
          <div class="relative h-48 mb-4 rounded-lg overflow-hidden">
            <img src="${pais.imagen}" alt="${pais.nombre}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/60 to-transparent"></div>
            <div class="absolute bottom-4 left-4 flex items-center gap-2">
              <div class="bg-white/20 backdrop-blur-md p-1.5 rounded-lg border border-white/30">
                <span class="material-symbols-outlined text-white">flag</span>
              </div>
              <h3 class="text-xl font-bold text-white">${pais.nombre}</h3>
            </div>
          </div>
          <div class="flex-grow space-y-3">
            <div class="flex flex-wrap items-center gap-2">
              ${pais.tags.map(tag => `<span class="inline-block px-2 py-1 rounded-full bg-indigo-100 text-indigo-700 text-xs font-semibold">${tag}</span>`).join('')}
            </div>
            <p class="text-gray-600 text-sm">${pais.descripcion}</p>
          </div>
          <button class="mt-4 w-full bg-indigo-600 text-white text-sm font-semibold py-3 rounded-lg flex items-center justify-center gap-2 shadow-md hover:bg-indigo-700 transition-all active:scale-95">
            <span class="material-symbols-outlined text-base">download</span>
            Descargar Ficha PDF
          </button>
        `;
        
        // Agregar evento al botón de descarga
        const btnDescargar = card.querySelector('button');
        if (btnDescargar) {
          btnDescargar.addEventListener('click', () => {
            alert(`📄 Descargando ficha técnica de ${pais.nombre}\n\nPróximamente: Generación de PDF personalizado.`);
          });
        }
        
        container.appendChild(card);
      });
    }

    // Navegación
    function setupNavigation() {
      const btnInicio = document.getElementById("btnInicio");
      if (btnInicio) {
        btnInicio.addEventListener("click", () => {
          window.location.href = "portal.html";
        });
      }
    }

    // Configurar menú desplegable
    function setupMenu() {
      const btnMenu = document.getElementById("btnMenu");
      const menuPanel = document.getElementById("menuPanel");
      if (btnMenu && menuPanel) {
        btnMenu.addEventListener("click", (e) => {
          e.stopPropagation();
          menuPanel.classList.toggle("hidden");
        });
        document.addEventListener("click", (e) => {
          if (!menuPanel.contains(e.target) && !btnMenu.contains(e.target)) {
            menuPanel.classList.add("hidden");
          }
        });
      }
      
      const menuEntregados = document.getElementById("menuProyectosEntregados");
      if (menuEntregados) {
        menuEntregados.addEventListener("click", () => {
          menuPanel.classList.add("hidden");
          window.location.href = "entregados.html";
        });
      }
      
            const menuFichas = document.getElementById("menuFichasTecnicas");
      if (menuFichas) {
        menuFichas.addEventListener("click", () => {
          menuPanel.classList.add("hidden");
          window.location.reload();
        });
      }
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      console.log("🚀 Iniciando página de fichas técnicas...");
      renderFichas();
      setupMenu();
      setupNavigation();
    });
  </script>
</body>
</html>
