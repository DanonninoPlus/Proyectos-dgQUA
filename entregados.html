<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGCIDCIENCIA - Proyectos Entregados</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 700; }
    .diplomatic-shadow { box-shadow: 0 8px 24px rgba(22,40,57,0.06); }
    .bg-surface { background-color: #f8f9fa; }
    .bg-surface-container-low { background-color: #edeeef; }
    .bg-surface-container-high { background-color: #e7e8e9; }
    .bg-surface-container-lowest { background-color: #ffffff; }
    .text-primary { color: #162839; }
    .text-secondary { color: #4646d8; }
    .text-outline { color: #74777d; }
    .text-on-surface-variant { color: #43474c; }
    .border-secondary\/10 { border-color: rgba(70,70,216,0.1); }
    .bg-secondary-fixed { background-color: #e1e0ff; }
    .bg-tertiary-fixed { background-color: #6dfad2; }
    .rotate-180 { transform: rotate(180deg); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <!-- HEADER (igual que portal.html) -->
  <header class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
        <i class="fas fa-globe-americas text-xl"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">DGCIDCIENCIA</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">DG de Proyectos de Cooperación Internacional</p>
      </div>
    </div>
    <button id="btnMenu" class="p-2 hover:bg-slate-100 rounded-full transition-all text-indigo-600 focus:ring-2 focus:ring-indigo-500">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </header>

  <!-- MENÚ DESPLEGABLE -->
  <div id="menuPanel" class="hidden fixed top-[60px] right-4 bg-white rounded-xl shadow-xl border border-gray-200 z-[9999] w-56">
    <div class="flex flex-col">
      <button id="menuProyectosEntregados" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-t-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">check_circle</span>
        <span>Proyectos entregados</span>
      </button>
      <button id="menuFichasTecnicas" class="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-3 rounded-b-xl">
        <span class="material-symbols-outlined text-indigo-500 text-base">description</span>
        <span>Fichas Técnicas</span>
      </button>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL (Diseño de Proyectos Entregados) -->
  <main class="pt-6 pb-32 px-4 max-w-7xl mx-auto">
    <div class="mb-6">
      <h2 class="text-3xl font-bold text-primary">Proyectos Entregados</h2>
      <p class="text-on-surface-variant text-base mt-2">Historial</p>
    </div>

    <!-- Dashboard Stat Grid -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="md:col-span-2 glass-card p-5 rounded-xl shadow-lg shadow-primary/5 flex flex-col justify-between overflow-hidden relative group bg-white/70 backdrop-blur-sm">
        <div class="relative z-10">
          <span class="text-primary font-semibold text-xs uppercase tracking-widest">TOTAL</span>
          <h3 class="text-4xl font-bold text-primary mt-1" id="totalEntregados">0</h3>
          <p class="text-on-surface-variant text-sm mt-2">Estos proyectos corresponden a: Argentina, Bolivia,  Brasil, Colombia y Paraguay</p>
        </div>
        <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:opacity-20 transition-opacity">
          <span class="material-symbols-outlined text-[120px]">public</span>
        </div>
      </div>
      <div class="bg-indigo-600 text-white p-5 rounded-xl shadow-xl flex flex-col justify-center items-center text-center">
        <span class="material-symbols-outlined text-4xl mb-2">verified</span>
        <span class="text-3xl font-bold leading-none" id="porcentajeCertificacion">100</span>
        <span class="text-xs font-semibold mt-1"></span>
      </div>
      <div class="bg-surface-container-high p-5 rounded-xl flex flex-col justify-center items-center text-center">
        <span class="material-symbols-outlined text-4xl text-amber-600 mb-2">calendar_today</span>
        <span class="text-3xl font-bold text-primary leading-none" id="ultimoAnio">0</span>
        <span class="text-xs font-semibold text-on-surface-variant mt-1">Año en el que Finaliza el Último Proyecto</span>
      </div>
    </div>

    <!-- Proyectos Agrupados por Continente/País -->
    <div class="space-y-6" id="entregadosList"></div>
  </main>



    <!-- FOOTER SIMPLIFICADO (solo INICIO) -->
  <nav class="fixed bottom-0 w-full bg-white border-t flex justify-center items-center py-3 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="btnInicio" class="flex flex-col items-center gap-1 transition-colors px-6 text-indigo-600 hover:text-indigo-800">
      <i class="fas fa-home text-lg"></i>
      <span class="text-[10px] font-medium uppercase tracking-tighter">Inicio</span>
    </button>
  </nav>

  

  <script>
    // Cargar datos del JSON de entregados
    let entregados = [];

    async function loadEntregados() {
      try {
        console.log("🔄 Cargando proyectos entregados...");
        const res = await fetch("https://raw.githubusercontent.com/DanonninoPlus/DGCIDCIENCIA/main/entregados.json");
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        entregados = Array.isArray(data) ? data : [];
        console.log(`✅ ${entregados.length} proyectos entregados cargados`);
        renderEntregados();
      } catch (err) {
        console.error("❌ Error cargando entregados:", err);
        document.getElementById("totalEntregados").textContent = "Error";
        document.getElementById("entregadosList").innerHTML = `<div class="text-center py-8 text-red-500">Error al cargar los datos. Verifica que el archivo entregados.json exista.</div>`;
      }
    }

    function renderEntregados() {
      console.log("🎨 Renderizando proyectos entregados...");
      
      // Actualizar contador total
      const totalEntregadosSpan = document.getElementById("totalEntregados");
      if (totalEntregadosSpan) totalEntregadosSpan.textContent = entregados.length;
      
      // Calcular porcentaje de certificación (puedes ajustar la fórmula si quieres)
      const porcentajeSpan = document.getElementById("porcentajeCertificacion");
      if (porcentajeSpan) porcentajeSpan.textContent = `100%`;
      
      // Obtener año más reciente de los proyectos
      const años = entregados.map(p => parseInt(p.Fechadetermino)).filter(a => !isNaN(a));
      const ultimoAño = años.length > 0 ? Math.max(...años) : 2024;
      const ultimoAnioSpan = document.getElementById("ultimoAnio");
      if (ultimoAnioSpan) ultimoAnioSpan.textContent = ultimoAño;

      // Recolectar países únicos para la descripción
      const paisesSet = new Set();
      entregados.forEach(p => {
        if (p.Pais) paisesSet.add(p.Pais);
      });
      const paisesLista = Array.from(paisesSet).sort().join(', ');
      const descripcionSpan = document.querySelector('#totalEntregados')?.closest('.glass-card')?.querySelector('.text-on-surface-variant');
      if (descripcionSpan && paisesLista) {
        descripcionSpan.textContent = `Proyectos: ${paisesLista}`;
      }

      // Si no hay entregados
      if (entregados.length === 0) {
        const container = document.getElementById("entregadosList");
        if (container) {
          container.innerHTML = `<div class="text-center py-8 text-gray-500">No hay proyectos entregados registrados.</div>`;
        }
        return;
      }

      // Agrupar por continente y país
      const grupos = {};
      entregados.forEach(p => {
        const continente = p.Continente || "Sin Continente";
        const pais = p.Pais || "Sin País";
        if (!grupos[continente]) grupos[continente] = {};
        if (!grupos[continente][pais]) grupos[continente][pais] = [];
        grupos[continente][pais].push(p);
      });

      const container = document.getElementById("entregadosList");
      if (!container) return;
      container.innerHTML = "";

      Object.keys(grupos).sort().forEach(continente => {
        const continenteDiv = document.createElement("div");
        continenteDiv.className = "space-y-3 mb-6";
        continenteDiv.innerHTML = `
          <div class="flex items-center gap-3 mb-3 border-l-4 border-secondary pl-4">
            <h3 class="text-xl font-bold text-primary">${escapeHtml(continente)}</h3>
            <div class="h-px flex-grow bg-outline-variant/30"></div>
          </div>
          <div class="space-y-3" id="paises-${continente.replace(/\s/g, '')}"></div>
        `;
        const paisesContainer = continenteDiv.querySelector(`#paises-${continente.replace(/\s/g, '')}`);
        
        Object.keys(grupos[continente]).sort().forEach(pais => {
          const proyectosPais = grupos[continente][pais];
          const paisDiv = document.createElement("div");
          paisDiv.className = "bg-white rounded-xl shadow-sm border border-indigo-50 overflow-hidden mb-3";
          paisDiv.innerHTML = `
            <button class="w-full flex items-center justify-between p-4 hover:bg-indigo-50/50 transition-colors accordion-btn">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-secondary text-xl">flag</span>
                <span class="font-semibold text-lg text-primary">${escapeHtml(pais)}</span>
                <span class="text-xs text-gray-400">(${proyectosPais.length} proyectos)</span>
              </div>
              <span class="material-symbols-outlined text-outline-variant transition-transform accordion-icon">expand_more</span>
            </button>
            <div class="accordion-panel hidden p-4 space-y-3 border-t border-indigo-50">
              ${proyectosPais.map(p => renderProjectCard(p)).join('')}
            </div>
          `;
          paisesContainer.appendChild(paisDiv);
        });
        
        container.appendChild(continenteDiv);
      });

      // Activar acordeones
      document.querySelectorAll('.accordion-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const panel = btn.nextElementSibling;
          const icon = btn.querySelector('.accordion-icon');
          panel.classList.toggle('hidden');
          icon.classList.toggle('rotate-180');
        });
      });
    }

    function renderProjectCard(p) {
      // Determinar color según status
      let statusColor = 'bg-gray-100 text-gray-700';
      let statusText = p.status || 'Entregado';
      
      if (p.status === 'Finalizado') {
        statusColor = 'bg-green-100 text-green-700';
      } else if (p.status === 'Ejecución') {
        statusColor = 'bg-blue-100 text-blue-700';
      } else if (p.status === 'Planeación') {
        statusColor = 'bg-orange-100 text-orange-700';
      }
      
      return `
        <div class="bg-surface-container-lowest p-4 rounded-xl border border-indigo-100 shadow-sm hover:shadow-md transition-shadow mb-3">
          <div class="flex justify-between items-start">
            <h4 class="font-bold text-lg text-primary mb-2">${escapeHtml(p.Nombredelproyecto)}</h4>
            <span class="px-2 py-1 ${statusColor} text-[10px] font-black rounded-full uppercase tracking-widest">${escapeHtml(statusText)}</span>
          </div>
          <div class="bg-primary-fixed/30 p-3 rounded-lg flex items-center gap-4 mb-4">
            <div class="flex flex-col">
              <span class="text-[10px] font-bold text-on-primary-fixed-variant uppercase">Inicio</span>
              <span class="text-sm font-semibold text-primary">${p.Fechadeinicio || '---'}</span>
            </div>
            <div class="w-px h-8 bg-primary/20"></div>
            <div class="flex flex-col">
              <span class="text-[10px] font-bold text-on-primary-fixed-variant uppercase">Término</span>
              <span class="text-sm font-semibold text-primary">${p.Fechadetermino || '---'}</span>
            </div>
          </div>
          ${p.Sector ? `
          <div class="mb-4">
            <span class="text-xs font-semibold text-secondary block mb-1">Sector</span>
            <p class="text-sm text-on-surface-variant">${escapeHtml(p.Sector)}</p>
          </div>
          ` : ''}
          ${p.Objetivo && p.Objetivo !== 'Pendiente' ? `
          <div class="mb-4">
            <span class="text-xs font-semibold text-secondary block mb-1">Objetivo Estratégico</span>
            <p class="text-sm text-on-surface-variant">${escapeHtml(p.Objetivo)}</p>
          </div>
          ` : ''}
          ${p.notas && p.notas !== 'Pendiente' ? `
          <div class="bg-surface-container-low p-3 rounded-lg border-l-4 border-tertiary">
            <div class="flex items-center gap-2 mb-1">
              <span class="material-symbols-outlined text-amber-600 text-sm">sticky_note_2</span>
              <span class="text-xs font-semibold text-amber-600">Observaciones Técnicas</span>
            </div>
            <p class="text-sm italic text-on-surface">${escapeHtml(p.notas)}</p>
          </div>
          ` : ''}
        </div>
      `;
    }

    function escapeHtml(text) {
      if (!text) return "";
      return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Navegación - Botón de Inicio
    function setupNavigation() {
      const btnInicio = document.getElementById("btnInicio");
      if (btnInicio) {
        btnInicio.addEventListener("click", () => {
          window.location.href = "portal.html";
        });
      }
    }

    // Configurar menú desplegable
    function setupMenu() {
      const btnMenu = document.getElementById("btnMenu");
      const menuPanel = document.getElementById("menuPanel");
      if (btnMenu && menuPanel) {
        btnMenu.addEventListener("click", (e) => {
          e.stopPropagation();
          menuPanel.classList.toggle("hidden");
        });
        document.addEventListener("click", (e) => {
          if (!menuPanel.contains(e.target) && !btnMenu.contains(e.target)) {
            menuPanel.classList.add("hidden");
          }
        });
      }
      
      const menuEntregados = document.getElementById("menuProyectosEntregados");
      if (menuEntregados) menuEntregados.addEventListener("click", () => {
        menuPanel.classList.add("hidden");
        window.location.reload();
      });
      
      const menuFichas = document.getElementById("menuFichasTecnicas");
      if (menuFichas) {
        menuFichas.addEventListener("click", () => {
          menuPanel.classList.add("hidden");
          window.location.href = "fichas.html";
        });
      }

    // Inicializar todo cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
      console.log("🚀 Iniciando página de proyectos entregados...");
      loadEntregados();
      setupMenu();
      setupNavigation();
    });
  </script>

  

</body>
</html>
